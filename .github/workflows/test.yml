    #       - dockerFile: operator3.Dockerfile
    #         image: ghcr.io/equinor/radix/operator3
    steps:

        - name: rx
          run: |
            go install github.com/equinor/radix-cli/cli/rx@239cc39a13499d3529d085ec78d41f8c426ad4cb && \
            rx version && \
            rx login --use-github-credentials --azure-client-id ${{vars.AZURE_CLIENT_ID}}
