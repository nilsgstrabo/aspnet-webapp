name: Test matrix
on:
  workflow_dispatch: 
jobs:
  deploy-container-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      CONTAINER_REGISTRY: ghcr.io
