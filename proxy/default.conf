limit_req_zone $binary_remote_addr zone=per_client:10m rate=10r/s;

server {
    listen 8080;
    limit_req_status 429;

    root /usr/share/nginx/html;
    index index.html;

    real_ip_header X-Forwarded-For;
    real_ip_recursive off;

    # Trust Istio proxies in Radix.
    set_real_ip_from 10.0.0.0/8;

    location / {
        # allow 143.97.110.1;           # Specific IP address allowed
        allow 143.97.110.1/24;       # IP address range allowed (CIDR notation)
        deny all; 
        
        limit_req zone=per_client burst=20 nodelay;
        
        try_files $uri $uri/ =404;
        # proxy_pass http://web:5005/;
    }
}
